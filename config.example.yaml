# Copy this file to config.yaml and customise.
# The password hash below is bcrypt("admin") — change it with hash_password.py
# before putting this anywhere but a local test machine.

secret_key: "CHANGE-ME-TO-A-LONG-RANDOM-STRING"

# Web UI listener
web:
  host: "0.0.0.0"
  port: 8080

# If running behind nginx/traefik with X-Forwarded-For, set true so the
# dashboard sees the real client IP (must match the TCP source IP).
trust_proxy: false

# Only send the session cookie over TLS. Set true in production.
session_cookie_secure: false

# JSON Lines audit log: login, activate/extend/deactivate, and TCP
# connection accept/reject events. Unset to disable file logging
# (ring buffer stays available in the web UI).
audit_log_path: "logs/audit.log"

# Rotation: "weekly" (default, Monday 00:00 UTC), "daily", or "off".
# Rotated files are gzipped as audit-YYYY-MM-DD.log.gz and kept forever.
audit_rotation: "weekly"

users:
  admin:
    password_hash: "$2b$12$34SQxalxN24WEkcqtIDH8.Lf4me3F9L/gTtX1gh/UNRQWnD81MrIC"  # "admin"

# Each service binds one TCP port and forwards to the target once the
# client's IP has been whitelisted via the web UI.
services:
  - name: postgres
    listen: "0.0.0.0:5432"
    target: "postgres:5432"

  - name: web-target
    listen: "0.0.0.0:8888"
    target: "nginx:80"
