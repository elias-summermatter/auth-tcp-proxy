services:
  gateway:
    build: .
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    devices:
      - /dev/net/tun:/dev/net/tun
    sysctls:
      net.ipv4.ip_forward: "1"
      net.ipv4.conf.all.src_valid_mark: "1"
    environment:
      # Display timezone for audit timestamps and the Users table. Python
      # logs and the dashboard frontend both honour this. UTC is kept for
      # persistence; this only affects what humans see.
      TZ: Europe/Zurich
    ports:
      - "51820:51820/udp"      # WireGuard — must be reachable from users
    expose:
      - "8080"                 # web UI — only to caddy, not the internet
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./logs:/app/logs
      - ./state:/app/state
    restart: unless-stopped

  # Reverse proxy + automatic TLS via Let's Encrypt. Requires DNS pointing
  # at this VM and ports 80/443 open.
  caddy:
    image: caddy:2-alpine
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - gateway
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
